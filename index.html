<!DOCTYPE html>
<html>
<head>
    <title>Joyeux Anniversaire 🎉</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 3em;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: white;
            color: #ff4e50;
        }

        button:hover {
            background: #ffe0e6;
        }
    </style>
</head>
<body>

    <h1>🎂 Joyeux Anniversaire !!! 🎂</h1>
    <p>Une petite surprise t'attend...</p>
    <button onclick="surprise()">Clique ici 🎁</button>

    <script>
        function surprise() {
            document.body.style.background = "black";
            document.body.innerHTML = "<h1>Tu es incroyable ❤️</h1><p>Merci d'être dans ma vie 🎉</p>";
        }
    </script>

</body>
</html>
